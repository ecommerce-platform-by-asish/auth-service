server:
  port: 8081
  servlet:
    context-path: /api/auth

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    enabled: false
  use-management-port: false

spring:
  application:
    name: auth-service
  threads:
    virtual:
      enabled: true
  docker:
    compose:
      enabled: true
      lifecycle-management: start-only
  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: ecommerce
    password: admin
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
#    locations: classpath:db/migration
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  security:
    rsa:
      generate: true
    jwt:
      expiration-ms: 86400000


