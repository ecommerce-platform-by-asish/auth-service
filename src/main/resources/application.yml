server:
  port: 8081
  servlet:
    context-path: /api/auth

spring:
  application:
    name: auth-service
  threads:
    virtual:
      enabled: true
  docker:
    compose:
      enabled: true
      lifecycle-management: start-only
  data:
    redis:
      host: localhost
      port: 6379

app:
  security:
    public-paths:
      - "/.well-known/**"
      - "/login"
      - "/register"
      - "/logout"
    rsa:
      generate: true
    jwt:
      expiration-ms: 86400000
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: ecommerce
    password: admin
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
#    locations: classpath:db/migration
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  expiration-ms: 86400000
