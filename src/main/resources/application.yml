server:
  port: 8081
  servlet:
    context-path: /api/auth

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    enabled: false
  use-management-port: false

spring:
  application:
    name: auth-service
  threads:
    virtual:
      enabled: true
  docker:
    compose:
      enabled: false
      lifecycle-management: start-only
  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: ecommerce
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
      connection-timeout: 3000
  flyway:
    enabled: true
#    locations: classpath:db/migration
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50

app:
  openapi:
    enabled: true
    title: "Auth Service API"
    description: "Authentication and Authorization Service"
    version: "1.0.0"
  security:
    rsa:
      generate: true
    jwt:
      expiration-ms: 86400000


