server:
  port: 8081
  servlet:
    context-path: /api/auth


spring:
  application:
    name: auth-service
  docker:
    compose:
      enabled: false
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: ecommerce
    password: admin
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
      connection-timeout: 3000
  flyway:
    enabled: true

    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          batch_size: 50

app:
  openapi:
    enabled: true
    title: "Auth Service API"
    description: "Authentication and Authorization Service"
    version: "1.0.0"
  security:
    rsa:
      generate: true
    jwt:
      expiration-ms: 86400000
