name: ecommerce-app
services:
  postgres:
    image: postgres:17-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4-alpine
    container_name: auth-redis
    ports:
      - "6379:6379"
